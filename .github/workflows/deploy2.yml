  Enable GitHub Pages (Manual Setup)

  Step 1: Go to your repo settings
  Visit:
  https://github.com/jennifercsull-bit/bard-landing-page/settings/pages

  Step 2: Configure GitHub Pages
  - Source: Deploy from a branch
  - Branch: main
  - Folder: / (root)
  - Click Save

  Step 3: Add the workflow file (via GitHub web interface)
  1. Go to: https://github.com/jennifercsull-bit/bard-landing-page/new/main
